name: Release

# Push a tag like v0.1.0 → builds Junction.app and attaches it to a GitHub Release.
#
# Unsigned mode (default): ad-hoc signed. Users must right-click → Open once,
# or install via Homebrew with --no-quarantine.
#
# Signed mode (activates automatically when these repo secrets exist):
#   MACOS_CERT_P12_BASE64, MACOS_CERT_PASSWORD  — Developer ID Application cert
#   NOTARY_APPLE_ID, NOTARY_TEAM_ID, NOTARY_PASSWORD — notarytool credentials
on:
  push:
    tags: ["v*"]

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  release:
    runs-on: macos-latest
    # The `secrets` context is not allowed in `if:` conditions — map to env and test that.
    env:
      P12: ${{ secrets.MACOS_CERT_P12_BASE64 }}
      P12_PASSWORD: ${{ secrets.MACOS_CERT_PASSWORD }}
      NOTARY_APPLE_ID: ${{ secrets.NOTARY_APPLE_ID }}
      NOTARY_TEAM_ID: ${{ secrets.NOTARY_TEAM_ID }}
      NOTARY_PASSWORD: ${{ secrets.NOTARY_PASSWORD }}
    steps:
      - uses: actions/checkout@v4

      - name: Run tests
        run: swift test

      - name: Import signing certificate
        if: env.P12 != ''
        run: |
          echo "$P12" | base64 --decode > cert.p12
          security create-keychain -p tmp build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p tmp build.keychain
          security import cert.p12 -k build.keychain -P "$P12_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple: -s -k tmp build.keychain
          rm cert.p12
          echo "CODESIGN_IDENTITY=Developer ID Application" >> "$GITHUB_ENV"

      - name: Build and bundle
        run: Scripts/bundle-app.sh   # ad-hoc signs when CODESIGN_IDENTITY is unset

      - name: Notarize and staple
        if: env.NOTARY_APPLE_ID != ''
        run: |
          xcrun notarytool store-credentials junction \
            --apple-id "$NOTARY_APPLE_ID" --team-id "$NOTARY_TEAM_ID" --password "$NOTARY_PASSWORD"
          Scripts/notarize.sh

      - name: Zip (unsigned build)
        if: env.NOTARY_APPLE_ID == ''
        run: ditto -c -k --keepParent dist/Junction.app dist/Junction.zip

      - name: Compute checksum
        id: checksum
        run: |
          SHA=$(shasum -a 256 dist/Junction.zip | awk '{print $1}')
          echo "sha256=$SHA" >> "$GITHUB_OUTPUT"
          echo "SHA-256: $SHA"

      - name: Attest build provenance
        uses: actions/attest-build-provenance@v1
        with:
          subject-path: dist/Junction.zip

      - name: Write release notes
        run: |
          cat > release-notes.md <<'EOF'
          ## Install

          Download `Junction.zip`, unzip, drag **Junction.app** to /Applications.

          **This build is not notarized** (no Apple Developer account yet). On first
          launch macOS will warn you. Either right-click Junction.app → **Open** → Open,
          or clear the quarantine flag:

          ```sh
          xattr -dr com.apple.quarantine /Applications/Junction.app
          ```

          Verify what you downloaded — every release ships with GitHub build provenance:

          ```sh
          gh attestation verify Junction.zip --repo jnahian/junction
          ```
          EOF
          echo "**SHA-256:** \`${{ steps.checksum.outputs.sha256 }}\`" >> release-notes.md

      - name: Attach to release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/Junction.zip
          body_path: release-notes.md
          generate_release_notes: true

      # This repo is its own Homebrew tap (Casks/junction.rb at the root).
      # Bump the cask's version + sha256 on main so `brew upgrade` sees the release.
      - name: Bump Homebrew cask
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin main
          git checkout main
          VERSION="${GITHUB_REF_NAME#v}"
          SHA="${{ steps.checksum.outputs.sha256 }}"
          sed -i '' \
            -e "s/^  version \".*\"/  version \"$VERSION\"/" \
            -e "s/^  sha256 \".*\"/  sha256 \"$SHA\"/" \
            Casks/junction.rb
          git commit -am "Bump junction cask to $VERSION"
          git push origin main
